<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel 處理小幫手</title>
    <meta name="description" content="飛買家銷售明細 Excel 自動計算合併工具" />
    <link rel="stylesheet" href="style.css" />

    <!--
      ⚙️ Zeabur 部署設定：
      把下方 YOUR_BACKEND_DOMAIN 換成你在 Zeabur 後端服務的 domain，例如：
      https://calculator-api.zeabur.app
    -->
    <script>window.CALCULATOR_API_URL = "https://zeabur-test2.zeabur.app";</script>
  </head>
  <body>
    <div class="page-title">
      <h1>📊 <span>Excel 處理工具</span></h1>
      <p>自動合併與加總 SKU 銷售資料</p>
    </div>

    <div class="calculator-card uploader-card">
      <!-- API 狀態列 -->
      <div class="api-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">連線中…</span>
      </div>

      <!-- 上傳區域 -->
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".xlsx, .xls" hidden />
        <div class="upload-icon">📄</div>
        <p class="upload-title">點擊選擇或拖曳檔案至此</p>
        <p class="upload-subtitle">支援 .xlsx 格式</p>
        <div class="selected-file" id="file-name" style="display: none;">已選擇：<span></span></div>
      </div>

      <!-- 操作按鈕 -->
      <button id="btn-process" class="btn btn-equals btn-wide" disabled onclick="processFile()">
        <span class="btn-label">產生並下載報表</span>
        <div class="spinner"></div>
      </button>
    </div>

    <footer class="footer">自動識別檔名月份 (如 202603)</footer>

    <script src="app.js"></script>
  </body>
</html>
